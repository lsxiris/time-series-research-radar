name: Feature request
description: Propose an automation, documentation, or output improvement.
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What maintenance pain point does this solve?
      placeholder: Cross-venue comparison still has to be done manually.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the smallest useful improvement.
      placeholder: Add a script that builds a digest across multiple manifests.
    validations:
      required: true
